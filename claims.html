<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Réclamations — COBRA</title>

<style>
body {
margin:0;
font-family:"Segoe UI",sans-serif;
color:#111;
}

/* 🔥 BACKGROUND */
#bg-video {
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.75) saturate(1.3);
}

body::before {
content:"";
position:fixed;
inset:0;
background:linear-gradient(135deg, rgba(255,140,0,0.4), rgba(255,60,0,0.3));
z-index:-1;
}

/* HEADER FIXE */
.header {
position:fixed;
top:0;
left:0;
width:100%;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
z-index:1000;
}

/* CONTENU SCROLL */
.container {
margin-top:80px;
padding:15px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

/* CARD */
.card {
background:rgba(255,255,255,0.95);
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeUp 0.4s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* BOUTONS */
button {
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:linear-gradient(45deg,#ff9a00,#ff3d00);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover {
transform:scale(1.05);
}

/* FOOTER FIXE */
.footer {
position:fixed;
bottom:0;
left:0;
width:100%;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
}

.footer button {
background:linear-gradient(45deg,#555,#222);
}
</style>
</head>

<body>

<video autoplay muted loop id="bg-video">
<source src="bg-admin.mp4">
</video>

<div class="header">🚨 Réclamations COBRA</div>

<div class="container">
<div id="claimList"></div>
</div>

<div class="footer">
<button onclick="location.href='admin.html'">⬅ Retour</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, get, update, push, remove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
import { onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://securite-53ada-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);
const claimList = document.getElementById("claimList");

function listenClaims(){
onValue(ref(db,"serviceClaims"), async (snap)=>{
const claims = snap.val() || {};
claimList.innerHTML="";
let hasClaims=false;

for(const [claimKey,c] of Object.entries(claims)){
if(c.status==="resolved") continue;

const historySnap = await get(ref(db,"history/"+c.user+"/"+c.txId));
const h = historySnap.val();

if(!h) continue;

hasClaims=true;

claimList.innerHTML += `
<div class="card">
🆔 <b>${h.customID || c.txId}</b><br>
📤 ${h.from}<br>
📥 ${h.to}<br>
💰 ${h.amountOriginal}<br>
🕒 ${h.date}<br>
🧠 Risque : ${
c.risk === "high_risk" ? "🔴 Élevé" :
c.risk === "medium_risk" ? "🟡 Moyen" :
"🟢 Normal"
}<br>

<button onclick="resolveClaim('${c.txId}','${c.user}','${claimKey}')">
✔ Résoudre & Annuler transaction
</button>

<button onclick="deleteClaim('${claimKey}','${h.to}','${h.amountConverted}')"
style="background:gray;">
🗑 Supprimer
</button>
</div>
`;
}

if(!hasClaims){
claimList.innerHTML=`<div style="text-align:center;color:white;font-weight:bold;">
✅ Aucune réclamation
</div>`;
}
});
}

window.resolveClaim = async (historyKey, user, claimKey) => {

const snap = await get(ref(db,"history/"+user+"/"+historyKey));
const h = snap.val();

if(!h) return alert("❌ Transaction introuvable");
if(h.cancelled) return alert("⚠ Déjà annulée");

const senderSnap = await get(ref(db,"users/"+h.from));
const receiverSnap = await get(ref(db,"users/"+h.to));

let sender = senderSnap.val();
let receiver = receiverSnap.val();

if(!sender || !receiver) return alert("❌ Comptes introuvables");

/* =========================
💱 REMBOURSEMENT MULTI-DEVISE
========================= */

/*
🔥 montant envoyé
(devise expéditeur)
*/
const senderAmount =
Number(h.amountOriginal || 0);

/*
🔥 montant reçu
(devise destinataire)
*/
const receiverAmount =
Number(h.amountConverted || 0);

/* ❌ sécurité */
const disponible =
receiver.solde -
(receiver.frozenBalance || 0);

/*
🔥 vérifier si le destinataire
possède toujours le montant reçu
*/

if(receiver.solde < receiverAmount){
return alert(
"❌ Le destinataire ne possède plus assez de fonds"
);
}

/* =========================
💸 REMBOURSEMENT
========================= */

/*
🔥 expéditeur récupère
son montant original
*/

sender.solde =
Number(sender.solde || 0)
+ senderAmount;

/*
🔥 destinataire perd
seulement ce qu'il a reçu
*/

receiver.solde =
Number(receiver.solde || 0)
- receiverAmount;

/* =========================
🔓 RETIRER GEL
========================= */

receiver.frozenBalance =
Number(receiver.frozenBalance || 0)
- receiverAmount;

if(receiver.frozenBalance < 0){
receiver.frozenBalance = 0;
}

/* 🔄 mise à jour */
await update(ref(db,"users/"+h.from), sender);

await update(ref(db,"users/"+h.to),{
solde: receiver.solde,
frozenBalance: receiver.frozenBalance
});

await update(ref(db,"history/"+user+"/"+historyKey),{
cancelled:true,
status:"Annulée après réclamation"
});

await update(ref(db,"serviceClaims/"+claimKey),{
status:"resolved"
});

/* 🔔 notif */
await push(ref(db,"notifications/"+h.from),{
title:"💸 Remboursement",
amount:senderAmount,
phone:h.to,
date:new Date().toLocaleString()
});

alert("✅ Transaction annulée et remboursée !");
};

listenClaims();

window.deleteClaim = async function(claimKey, receiverPhone, amount){

if(!confirm("Supprimer cette réclamation ?")) return;

const receiverSnap = await get(ref(db,"users/"+receiverPhone));

if(receiverSnap.exists()){
let receiver = receiverSnap.val();

/* =========================
🔓 DÉBLOQUER ARGENT
========================= */

/*
🔥 amount ici doit être
le montant reçu
*/

receiver.frozenBalance =
Number(receiver.frozenBalance || 0)
- Number(amount || 0);

if(receiver.frozenBalance < 0){
receiver.frozenBalance = 0;
}

await update(ref(db,"users/"+receiverPhone),{
frozenBalance: receiver.frozenBalance
});
}

/* suppression */
await remove(ref(db,"serviceClaims/"+claimKey));

alert("✅ Réclamation supprimée & argent débloqué");
};

</script>
</body>
</html>
