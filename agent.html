<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Agent COBRA</title>

<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:"Segoe UI", sans-serif;
color:white;
padding-top:70px;
}

/* 🔥 VIDEO BACKGROUND */
#bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(1.1) contrast(1.05);
}

/* 🔥 OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(135deg, rgba(255,140,0,0.15), rgba(255,80,0,0.1));
backdrop-filter:blur(5px);
}

.container{
width:95%;
max-width:420px;
margin:20px auto;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.4);
text-align:center;
animation:fadeUp 0.5s ease;
}

.agent-header h3{
margin:0;
color:white;
}

.status{
color:#00c853;
font-weight:bold;
margin-bottom:15px;
}

.balance-card{
background:linear-gradient(270deg,#ff512f,#ff9966,#ff3d00,#ff6a00);
background-size:600% 600%;
animation:gradientMove 8s ease infinite;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
color:white;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.balance-card h1{
margin:10px 0 0;
font-size:26px;
}

.scanner-box{
margin:15px 0;
}

#scanBtn{
width:100%;
background:#222;
color:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

#reader{
width:100%;
border-radius:15px;
overflow:hidden;
margin-bottom:15px;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.deposit{
background: linear-gradient(45deg,#00c853,#00e676);
box-shadow:0 5px 15px rgba(0,200,83,0.4);
}

.withdraw{
background: linear-gradient(45deg,#ff3d00,#ff1744);
box-shadow:0 5px 15px rgba(255,0,0,0.4);
}

button:hover{
transform:scale(1.05);
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
color:white;
z-index:999;
}

.logo{
font-size:20px;
font-weight:bold;
}

.header-right{
display:flex;
align-items:center;
gap:10px;
}

.status-dot{
width:10px;
height:10px;
background:#00ff88;
border-radius:50%;
box-shadow:0 0 8px #00ff88;
}

.mini-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:12px;
border-radius:12px;
margin-top:15px;
font-size:13px;
text-align:left;
max-height:120px;
overflow:auto;
color:white;
}

.hero-wall {
position: fixed;
inset: 0;
z-index: -2;
overflow: hidden;
}

.hero-wall video,
.hero-wall img {
width: 100%;
height: 100%;
object-fit: cover;
}

.hero-overlay {
position: fixed;
inset: 0;
background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.4));
z-index:-1;
}

/* 🔊 bouton son */
.audio-btn {
position: fixed;
bottom: 15px;
right: 15px;
z-index: 10;
background: rgba(0,0,0,0.35);
backdrop-filter: blur(6px);
border: none;
border-radius: 50%;
width: 42px;
height: 42px;
color: white;
font-size: 16px;
cursor: pointer;
opacity: 0.6;
}

.audio-btn:hover {
opacity: 1;
transform: scale(1.1);
}

.balance-card{
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND DYNAMIQUE -->
<div class="hero-wall">
<video id="bgVideo" playsinline></video>
<img id="bgImage">
</div>

<button id="toggleAudio" class="audio-btn">🔇</button>

<div class="hero-overlay"></div>

    <header class="header">
<div class="logo">💎 MaliPay - Agent</div>

<div class="header-right">
<div class="status-dot"></div>
</div>
</header>

<div class="container">

<!-- 🔶 HEADER AGENT -->
<div class="agent-header">
<h3 id="agentName">👨‍💼 Agent</h3>
<p class="status">🟢 Actif</p>
</div>

<!-- 🔶 CARTE SOLDE -->
<div class="balance-card">
<p>💼 Solde disponible</p>
<h1 id="agentBalance">0 FCFA</h1>
<p id="agentLimit" style="margin-top:5px;font-size:14px;"></p>
</div>

<!-- 🔶 SCANNER -->
<div class="scanner-box">
<button onclick="toggleScanner()" id="scanBtn">📷 Scanner QR</button>
<div id="reader" style="display:none;"></div>
<div id="result"></div>
</div>

<!-- 🔶 ACTIONS -->
 <div id="miniHistory" class="mini-box"></div>
<div class="actions">
<button class="deposit" onclick="startDeposit()">💰 Dépôt</button>
<button class="withdraw" onclick="startWithdraw()">💸 Retrait</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBsKMDF-nX-4tM_Hh0JPozZRuY9x9sFmh4",
databaseURL:"https://securite-53ada-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= BACKGROUND DYNAMIQUE =================
const video = document.getElementById("bgVideo");
const image = document.getElementById("bgImage");
const toggleAudioBtn = document.getElementById("toggleAudio");

let isMuted = true;
let currentIsVideo = false;

// 🔊 bouton audio
toggleAudioBtn.addEventListener("click", () => {
isMuted = !isMuted;
if(currentIsVideo){
video.muted = isMuted;
}
toggleAudioBtn.textContent = isMuted ? "🔇" : "🔊";
});

// 🔥 fallback si Firebase vide
let maliMedia = [
{type:"image", url:"https://images.unsplash.com/photo-1600172454520-134a542d7c97"},
{type:"video", url:"https://cdn.pixabay.com/video/2018/10/09/18675-297657059_large.mp4"}
];

let index = 0;
let currentTimeout;

function switchMedia(){
if (!maliMedia.length) return;

clearTimeout(currentTimeout);
const ad = maliMedia[index];

// 🎬 VIDEO
if (ad.type === "video") {
video.src = ad.url;
video.style.display = "block";
image.style.display = "none";
video.muted = isMuted;
currentIsVideo = true;

video.onloadedmetadata = () => {
video.play().catch(()=>{});

const duration = ad.duration || video.duration || 10;

currentTimeout = setTimeout(() => {
index = (index + 1) % maliMedia.length;
switchMedia();
}, duration * 1000);
};
}

// 🖼 IMAGE
else {
image.src = ad.url;
image.style.display = "block";
video.style.display = "none";
currentIsVideo = false;

const duration = ad.duration || 10;

currentTimeout = setTimeout(() => {
index = (index + 1) % maliMedia.length;
switchMedia();
}, duration * 1000);
}
}

// restart
function restartSlider(){
index = 0;
switchMedia();
}

// 🔥 démarrage
restartSlider();

// 🔥 FIREBASE SYNC (COMME INDEX.HTML)
onValue(ref(db, "ads"), snap => {
const data = snap.val();
if (!data) return;

maliMedia = Object.values(data);
restartSlider();
});

/* ===== AGENT CONNECTÉ ===== */
let agent = JSON.parse(localStorage.getItem("loggedAgent"));

if(!agent){
alert("Accès refusé");
window.location.href="index.html";
}

async function loadAgentBalance(){
const snap = await get(ref(db,"agents/"+agent.phone));

if(snap.exists()){
const data = snap.val(); // ✅ d'abord

// 🔥 afficher nom agent
document.getElementById("agentName").innerText =
"👨‍💼 " + (data.name || "Agent");

// 🔥 sécurité
if(!data.activityUsed) data.activityUsed = 0;

// 🔥 solde
document.getElementById("agentBalance").innerText =
Number(data.solde || 0).toLocaleString() + " FCFA";

// 🔥 plafond
document.getElementById("agentLimit").innerText =
"📊 " + data.activityUsed + " / " + data.plafond + " FCFA";
}
}

loadAgentBalance();
loadMiniHistory();

let notifShown = false;

onValue(ref(db,"notifications/"+agent.phone), snap=>{
if(!snap.exists()) return;

// 🔥 empêcher répétition
if(notifShown) return;

notifShown = true;

let list = Object.values(snap.val()).slice(-3).reverse();
let msg = "🔔 Notifications\n\n";

list.forEach(n=>{
msg += n.title + " ("+n.amount+")\n";
});

alert(msg);
});

async function loadMiniHistory(){
const snap = await get(ref(db,"transactions"));
if(!snap.exists()) return;

let list = [];

snap.forEach(child=>{
const t = child.val();
if(t.agent && t.agent === agent.phone){
list.push(t);
}
});

list = list.reverse().slice(0,5);

let html = "📊 Activité récente:<br>";

list.forEach(t=>{
html += "• "+t.type+" : "+t.amount+"<br>";
});

document.getElementById("miniHistory").innerHTML = html;
}


/* ===== QR SCAN ===== */
let scannedUser = null;
let scannerRunning = false;
let html5QrCode = null;

function onScanSuccess(decodedText){
document.getElementById("result").innerText = "📱 "+decodedText;
scannedUser = decodedText;
}

window.toggleScanner = async function(){

const reader = document.getElementById("reader");
const btn = document.getElementById("scanBtn");

if(!scannerRunning){

reader.style.display = "block";
btn.innerText = "❌ Fermer Scanner";

html5QrCode = new Html5Qrcode("reader");

/* 🔥 caméra arrière */
const cameras = await Html5Qrcode.getCameras();

let backCamera = cameras.find(c =>
c.label.toLowerCase().includes("back")
) || cameras[0];

try{
await html5QrCode.start(
backCamera.id,
{ fps: 10, qrbox: 250 },
onScanSuccess
);
}catch(e){
alert("❌ Erreur caméra");
console.error(e);
}

scannerRunning = true;

}else{

await html5QrCode.stop();
reader.style.display = "none";
btn.innerText = "📷 Ouvrir Scanner";

scannerRunning = false;
}
};

/* ===== DEPOT ===== */
window.startDeposit = async function(){

if(!scannedUser){
alert("Scanne un QR d'abord");
return;
}

let amount = parseFloat(prompt("Montant dépôt ?"));
if(!amount || amount <= 0){
alert("Montant invalide");
return;
}

const userRef = ref(db,"users/"+scannedUser);
const agentRef = ref(db,"agents/"+agent.phone);

const userSnap = await get(userRef);
const agentSnap = await get(agentRef);

let userData = userSnap.val();
let agentData = agentSnap.val();

// 🔥 INIT
if(!agentData.activityUsed) agentData.activityUsed = 0;

// 🔥 BLOQUAGE PLAFOND
if((agentData.activityUsed + amount) > agentData.plafond){
alert("❌ Limite d'activité atteinte !");
return;
}

// 🔥 VERIF SOLDE
if(agentData.solde < amount){
alert("❌ Solde insuffisant");
return;
}

// 🔥 LOGIQUE
agentData.solde -= amount;
agentData.activityUsed += amount;

userData.solde += amount;

await update(userRef,userData);
await update(agentRef,{
solde:agentData.solde,
activityUsed:agentData.activityUsed
});

// 🔥 HISTORIQUE GLOBAL
await push(ref(db,"transactions"),{
phone: scannedUser,
type: "Depot",
amount: amount,
agent: agent.phone,
date: new Date().toLocaleString()
});

alert("✅ Dépôt réussi");

loadAgentBalance();
loadMiniHistory();
};

/* ===== RETRAIT ===== */
/* ===== RETRAIT (DEMANDE SECURISEE) ===== */
window.startWithdraw = async function(){

if(!scannedUser){
alert("Scanne un QR d'abord");
return;
}

let amount = parseFloat(prompt("Montant retrait ?"));

if(!amount || amount <= 0){
alert("Montant invalide");
return;
}

const agentRef = ref(db,"agents/"+agent.phone);
const agentSnap = await get(agentRef);
let agentData = agentSnap.val();

// 🔥 INIT
if(!agentData.activityUsed) agentData.activityUsed = 0;
if(!agentData.pendingActivity) agentData.pendingActivity = 0;

// 🔥 VERIF PLAFOND (ULTRA PRO)
if((agentData.activityUsed + agentData.pendingActivity + amount) > agentData.plafond){
alert("❌ Limite d'activité atteinte !");
return;
}

// 🔥 réserver plafond
agentData.pendingActivity += amount;

await update(agentRef,{
pendingActivity: agentData.pendingActivity
});

// 🔥 envoyer demande au user
await push(ref(db,"withdrawRequests/"+scannedUser),{
agent: agent.phone,
fromAgent: agent.phone,
amount: amount,
fees: 0,
status: "pending",
date: new Date().toLocaleString()
});

alert("📩 Demande envoyée à l'utilisateur");
};
</script>

</body>
</html>
